<!DOCTYPE html>
<html lang="fr">
<head>
<script>
// Runtime base-path detection — works for root deploy AND subpath
// e.g. https://user.github.io/  OR  https://user.github.io/marie/
window.APP_BASE = (function() {
  var p = location.pathname;
  var base = p.endsWith('/') ? p : p.substring(0, p.lastIndexOf('/') + 1);
  var link = document.createElement('link');
  link.rel = 'manifest';
  link.href = base + 'manifest.json';
  document.head.appendChild(link);
  return base;
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2C4A7C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Marie">
<title>31 Jours avec Marie</title>
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

<style>
/* ════════════════════════════════════════════════
   DESIGN TOKENS
════════════════════════════════════════════════ */
:root {
  --primary: #2C4A7C;
  --primary-light: #3D6399;
  --accent: #C9A84C;
  --accent-light: #E8C96A;
  --ivory: #F8F6FC;
  --ivory-deep: #F0EDF8;
  --ink: #1C1830;
  --muted: #6B6580;
  --border: #DDD8EC;
  --border-light: #EDE9F5;
  --white: #FFFFFF;
  --soul-bg: #F3F0FA;
  --mary-bg: #EEF3FC;
  --practice-bg: #FBF8EE;
  --prayer-bg: #F8F6FC;
  --note-bg: #FFFBE8;
  --note-border: #C9A84C;
  --danger: #C0392B;

  --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  --font-reader: 'IM Fell English', 'Crimson Text', Georgia, serif;

  --reader-size: 17px;       /* controlled by text-size slider */
  --reader-lh: 1.82;

  --nav-h: 60px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --primary: #4A7CB8;
    --primary-light: #5E92CC;
    --accent: #D4A843;
    --accent-light: #E8C45A;
    --ivory: #1A1720;
    --ivory-deep: #201C2C;
    --ink: #E0DCF0;
    --muted: #8A8498;
    --border: #2E2840;
    --border-light: #261F38;
    --white: #201C2C;
    --soul-bg: #1E1B2C;
    --mary-bg: #1A1F30;
    --practice-bg: #1E1C12;
    --prayer-bg: #1A1720;
    --note-bg: #1C1A0C;
    --note-border: #C9A84C;
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--ivory);
  color: var(--ink);
  font-family: var(--font-ui);
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

/* ════════════════════════════════════════════════
   APP SHELL
════════════════════════════════════════════════ */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
}

.screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.screen.active { display: flex; }

/* Loading */
#screen-loading {
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 20px; background: var(--ivory); flex: 1;
}
.loading-crown { font-size: 40px; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.loading-text { font-family: var(--font-reader); font-size: 14px; color: var(--muted); letter-spacing: 0.05em; }

/* ── Top bar ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px 10px; background: var(--ivory); flex-shrink: 0;
}
.topbar-title { font-family: var(--font-reader); font-size: 17px; color: var(--ink); font-style: italic; }
.topbar-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 1px; }
.topbar-actions { display: flex; gap: 6px; }
.topbar-action {
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  border: 0.5px solid var(--border); border-radius: var(--radius-sm);
  color: var(--muted); cursor: pointer; background: transparent; font-size: 17px;
  transition: color 0.15s, background 0.15s;
}
.topbar-action:hover { background: var(--ivory-deep); color: var(--primary); }

/* ════════════════════════════════════════════════
   HOME SCREEN
════════════════════════════════════════════════ */
.calendar-wrap { padding: 8px 16px 4px; flex-shrink: 0; }
.calendar-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-cell {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; font-size: 11.5px; font-weight: 500; cursor: pointer;
  color: var(--muted); border: 1.5px solid transparent; transition: all 0.15s;
  position: relative; -webkit-tap-highlight-color: transparent; background: transparent;
}
.cal-cell:hover:not(:disabled) { color: var(--primary); border-color: var(--border); }
.cal-cell.today { background: var(--primary); color: var(--white); border-color: var(--primary); box-shadow: 0 0 0 2px var(--accent); }
.cal-cell.read { color: var(--accent); border-color: var(--accent); }
.cal-cell.read::after {
  content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%);
  width: 3px; height: 3px; border-radius: 50%; background: var(--accent);
}
.cal-cell.appendix { font-size: 10px; color: var(--border); border-color: var(--border-light); cursor: default; }

.progress-wrap { padding: 6px 16px 10px; flex-shrink: 0; }
.progress-row { display: flex; align-items: center; gap: 10px; }
.progress-bar-track { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }
.progress-label { font-size: 11px; color: var(--muted); white-space: nowrap; }
.divider { height: 0.5px; background: var(--border); margin: 0 16px; flex-shrink: 0; }

.hero-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px 16px 0; }
.hero-card {
  background: var(--white); border: 0.5px solid var(--border); border-radius: var(--radius-lg);
  overflow: hidden; margin-bottom: 12px; cursor: pointer; transition: transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.hero-card:active { transform: scale(0.99); }
.hero-card-header { background: var(--primary); padding: 16px 18px 14px; }
.hero-day-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent-light); margin-bottom: 8px; }
.hero-day-num { font-family: var(--font-reader); font-size: 34px; color: var(--white); line-height: 1; margin-bottom: 6px; }
.hero-ordinal { font-family: var(--font-reader); font-size: 13px; color: rgba(255,255,255,0.7); font-style: italic; }
.hero-card-body { padding: 16px 18px; }
.hero-title { font-family: var(--font-reader); font-size: 16px; color: var(--ink); line-height: 1.5; margin-bottom: 10px; }
.hero-excerpt {
  font-family: var(--font-reader); font-size: 14px; color: var(--muted); line-height: 1.65; font-style: italic;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 14px;
}
.hero-cta { display: flex; align-items: center; justify-content: space-between; }
.hero-read-btn {
  display: inline-flex; align-items: center; gap: 6px; background: var(--primary); color: var(--white);
  border: none; border-radius: var(--radius-sm); padding: 9px 16px; font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: var(--font-ui); transition: background 0.15s;
}
.hero-read-btn:hover { background: var(--primary-light); }
.hero-nav-btns { display: flex; gap: 6px; }
.hero-nav-btn {
  width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
  border: 0.5px solid var(--border); border-radius: var(--radius-sm); color: var(--muted);
  cursor: pointer; background: transparent; font-size: 16px; transition: all 0.15s;
}
.hero-nav-btn:hover { color: var(--primary); border-color: var(--primary); }
.hero-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.list-section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.09em; color: var(--muted); margin: 14px 0 8px; }

/* ════════════════════════════════════════════════
   LIST SCREEN
════════════════════════════════════════════════ */
.list-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 10px 16px 0; }
.list-card {
  display: flex; align-items: center; gap: 12px; background: var(--white);
  border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 12px 14px;
  margin-bottom: 6px; cursor: pointer; transition: border-color 0.15s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.list-card:hover { border-color: var(--primary); background: var(--ivory-deep); }
.list-day-circle {
  width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600; flex-shrink: 0; border: 1.5px solid var(--border);
  color: var(--muted); background: var(--ivory);
}
.list-day-circle.today-circle { background: var(--primary); color: var(--white); border-color: var(--primary); box-shadow: 0 0 0 2px var(--accent); }
.list-day-circle.read-circle { background: var(--accent); color: var(--white); border-color: var(--accent); }
.list-info { flex: 1; min-width: 0; }
.list-title { font-family: var(--font-reader); font-size: 14px; color: var(--ink); line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
.list-chevron { color: var(--border); font-size: 14px; flex-shrink: 0; }

/* ════════════════════════════════════════════════
   READER SCREEN
════════════════════════════════════════════════ */
#screen-reader { background: var(--ivory); }

.reader-topbar {
  display: flex; align-items: center; gap: 10px; padding: 12px 16px 8px;
  background: var(--ivory); border-bottom: 0.5px solid var(--border); flex-shrink: 0;
}
.reader-back {
  width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
  border: 0.5px solid var(--border); border-radius: var(--radius-sm); color: var(--muted);
  cursor: pointer; background: transparent; font-size: 18px; flex-shrink: 0;
}
.reader-back:hover { color: var(--primary); border-color: var(--primary); }
.reader-topbar-info { flex: 1; min-width: 0; }
.reader-topbar-day { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); font-weight: 600; }
.reader-topbar-title { font-family: var(--font-reader); font-size: 14px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.reader-topbar-actions { display: flex; gap: 6px; flex-shrink: 0; }
.reader-icon-btn {
  width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
  border: 0.5px solid var(--border); border-radius: var(--radius-sm); color: var(--muted);
  cursor: pointer; background: transparent; font-size: 16px; transition: all 0.15s;
}
.reader-icon-btn:hover, .reader-icon-btn.active { color: var(--primary); border-color: var(--primary); background: var(--mary-bg); }

.reader-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

.reader-hero { background: var(--primary); padding: 20px 20px 18px; }
.reader-hero-badge { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent-light); margin-bottom: 8px; }
.reader-hero-title { font-family: var(--font-reader); font-size: 19px; color: var(--white); line-height: 1.45; }

.reader-body { padding: 0 20px 20px; }

/* Section labels */
.section-label {
  font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted); margin: 22px 0 10px; display: flex; align-items: center; gap: 8px;
}
.section-label::after { content: ''; flex: 1; height: 0.5px; background: var(--border); }

/* Paragraph types */
.para-soul {
  font-family: var(--font-reader); font-size: var(--reader-size); color: var(--ink);
  line-height: var(--reader-lh); font-style: italic; margin-bottom: 1.1em;
  background: var(--soul-bg); padding: 12px 15px; border-radius: var(--radius-sm);
  border-left: 2.5px solid var(--border); position: relative;
}
.para-mary {
  font-family: var(--font-reader); font-size: var(--reader-size); color: var(--ink);
  line-height: var(--reader-lh); margin-bottom: 1.1em; position: relative;
}
.para-practice {
  font-family: var(--font-reader); font-size: calc(var(--reader-size) - 1px); color: var(--ink);
  line-height: var(--reader-lh); margin-bottom: 1em; background: var(--practice-bg);
  border: 0.5px solid var(--accent); border-left: 3px solid var(--accent);
  border-radius: var(--radius-sm); padding: 12px 15px; position: relative;
}
.para-prayer {
  font-family: var(--font-reader); font-size: calc(var(--reader-size) - 1px); color: var(--primary);
  line-height: var(--reader-lh); font-style: italic; text-align: center;
  background: var(--prayer-bg); border: 0.5px solid var(--border);
  border-radius: var(--radius-md); padding: 16px 20px; margin: 4px 0 12px; position: relative;
}

/* Note display under a paragraph */
.para-note {
  background: var(--note-bg); border: 0.5px solid var(--note-border);
  border-radius: var(--radius-sm); padding: 10px 13px; margin-top: -8px; margin-bottom: 1.1em;
  display: flex; align-items: flex-start; gap: 8px;
}
.para-note-icon { color: var(--accent); font-size: 13px; flex-shrink: 0; margin-top: 1px; }
.para-note-text {
  font-family: var(--font-ui); font-size: 13px; color: var(--ink); line-height: 1.55;
  flex: 1; white-space: pre-wrap; word-break: break-word;
}
.para-note-del {
  color: var(--muted); font-size: 14px; cursor: pointer; padding: 0 2px; flex-shrink: 0;
  transition: color 0.15s; line-height: 1;
}
.para-note-del:hover { color: var(--danger); }

/* Note button — always visible as a small corner indicator (mobile-safe, no hover dep) */
.para-note-btn {
  position: absolute; right: 6px; top: 6px;
  width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
  background: transparent; border: none; border-radius: 5px;
  color: var(--border); font-size: 13px; cursor: pointer; transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.para-note-btn:hover, .para-note-btn:active { color: var(--accent); background: var(--practice-bg); }

/* Reader nav */
.reader-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px 6px; flex-shrink: 0; border-top: 0.5px solid var(--border);
}
.reader-nav-btn {
  display: flex; align-items: center; gap: 5px; padding: 8px 12px;
  border: 0.5px solid var(--border); border-radius: var(--radius-sm);
  background: transparent; color: var(--muted); cursor: pointer; font-size: 12.5px;
  font-family: var(--font-ui); transition: all 0.15s; max-width: 45%;
}
.reader-nav-btn:hover { color: var(--primary); border-color: var(--primary); }
.reader-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.reader-nav-btn .nav-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
.reader-nav-center { font-size: 11px; color: var(--muted); text-align: center; }

/* Reader action bar */
.reader-actionbar {
  display: flex; align-items: center; padding: 10px 16px calc(10px + var(--safe-bottom));
  background: var(--ivory); border-top: 0.5px solid var(--border); gap: 8px; flex-shrink: 0;
}
.action-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 7px 4px; border: 0.5px solid var(--border); border-radius: var(--radius-sm);
  background: transparent; color: var(--muted); cursor: pointer; font-size: 11px;
  font-family: var(--font-ui); transition: all 0.15s; -webkit-tap-highlight-color: transparent;
}
.action-btn .action-icon { font-size: 18px; }
.action-btn:hover, .action-btn.active { color: var(--primary); border-color: var(--primary); background: var(--mary-bg); }
.action-btn.complete-btn.done { color: var(--accent); border-color: var(--accent); background: var(--practice-bg); }

/* ════════════════════════════════════════════════
   TEXT SIZE PANEL
════════════════════════════════════════════════ */
.textsize-panel {
  display: none; position: absolute; bottom: calc(var(--nav-h) + var(--safe-bottom) + 8px); left: 50%;
  transform: translateX(-50%); background: var(--white); border: 0.5px solid var(--border);
  border-radius: var(--radius-md); padding: 14px 18px; width: 260px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12); z-index: 50;
}
.textsize-panel.open { display: block; }
.textsize-panel-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 10px; }
.textsize-row { display: flex; align-items: center; gap: 10px; }
.textsize-small { font-size: 13px; color: var(--muted); font-family: var(--font-reader); }
.textsize-large { font-size: 19px; color: var(--muted); font-family: var(--font-reader); }
.textsize-slider { flex: 1; accent-color: var(--primary); cursor: pointer; }
.textsize-value { font-size: 12px; color: var(--primary); font-weight: 500; min-width: 30px; text-align: right; }
.textsize-preview {
  margin-top: 12px; padding: 10px 12px; background: var(--ivory); border-radius: var(--radius-sm);
  font-family: var(--font-reader); font-size: var(--reader-size); color: var(--ink);
  line-height: var(--reader-lh); font-style: italic;
}

/* ════════════════════════════════════════════════
   NOTE MODAL
════════════════════════════════════════════════ */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  z-index: 80; align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-sheet {
  background: var(--ivory); border-radius: 20px 20px 0 0; padding: 0; width: 100%;
  max-width: 480px; max-height: 80vh; display: flex; flex-direction: column;
  animation: slideUp 0.22s ease;
}
@keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
.modal-header { padding: 14px 18px 10px; border-bottom: 0.5px solid var(--border); }
.modal-title { font-family: var(--font-reader); font-size: 16px; color: var(--ink); }
.modal-subtitle { font-size: 11px; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.modal-body { padding: 14px 18px; flex: 1; overflow-y: auto; }
.note-excerpt {
  font-family: var(--font-reader); font-size: 14px; color: var(--muted); font-style: italic;
  line-height: 1.6; padding: 10px 12px; background: var(--soul-bg); border-radius: var(--radius-sm);
  margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.note-textarea {
  width: 100%; min-height: 120px; background: var(--white); border: 0.5px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px; font-size: 15px; font-family: var(--font-ui);
  color: var(--ink); line-height: 1.6; resize: vertical; outline: none; transition: border-color 0.15s;
}
.note-textarea:focus { border-color: var(--primary); }
.modal-footer { padding: 12px 18px calc(12px + var(--safe-bottom)); display: flex; gap: 8px; border-top: 0.5px solid var(--border); }
.modal-btn {
  flex: 1; padding: 11px; border-radius: var(--radius-sm); border: 0.5px solid var(--border);
  font-size: 14px; font-family: var(--font-ui); cursor: pointer; transition: all 0.15s;
}
.modal-btn-cancel { background: transparent; color: var(--muted); }
.modal-btn-cancel:hover { background: var(--ivory-deep); }
.modal-btn-save { background: var(--primary); color: var(--white); border-color: var(--primary); }
.modal-btn-save:hover { background: var(--primary-light); }

/* ════════════════════════════════════════════════
   MON ESPACE
════════════════════════════════════════════════ */
.espace-scroll { flex: 1; overflow-y: auto; padding: 16px; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
.stat-card { background: var(--white); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 12px 14px; }
.stat-num { font-size: 26px; font-weight: 500; line-height: 1; }
.stat-num.blue { color: var(--primary); }
.stat-num.gold { color: var(--accent); }
.stat-num.green { color: #27AE60; }
.stat-label { font-size: 10px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
.espace-section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.09em; color: var(--muted); margin: 16px 0 10px; }
.fav-card { background: var(--white); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 13px 15px; margin-bottom: 7px; cursor: pointer; transition: border-color 0.15s; }
.fav-card:hover { border-color: var(--primary); }
.fav-card-day { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); font-weight: 600; margin-bottom: 4px; }
.fav-card-text { font-family: var(--font-reader); font-size: 14px; color: var(--ink); line-height: 1.55; font-style: italic; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.note-espace-card { background: var(--note-bg); border: 0.5px solid var(--note-border); border-radius: var(--radius-md); padding: 13px 15px; margin-bottom: 7px; cursor: pointer; }
.note-espace-card:hover { border-color: var(--accent); }
.note-espace-meta { font-size: 10px; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
.note-espace-text { font-size: 13px; color: var(--ink); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.espace-empty { text-align: center; padding: 40px 20px; }
.espace-empty-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.35; }
.espace-empty-text { font-family: var(--font-reader); font-size: 15px; color: var(--muted); font-style: italic; line-height: 1.6; }

/* ════════════════════════════════════════════════
   BOTTOM NAV
════════════════════════════════════════════════ */
.bottom-nav {
  display: flex; align-items: stretch; background: var(--ivory); border-top: 0.5px solid var(--border);
  padding-bottom: var(--safe-bottom); flex-shrink: 0;
  height: calc(var(--nav-h) + var(--safe-bottom));
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; cursor: pointer; background: transparent; border: none; color: var(--muted);
  font-size: 10px; font-family: var(--font-ui); letter-spacing: 0.03em; transition: color 0.15s;
  -webkit-tap-highlight-color: transparent; padding-bottom: 2px;
}
.nav-btn .nav-icon { font-size: 22px; }
.nav-btn.active { color: var(--primary); }

/* ════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════ */
.toast {
  position: fixed; bottom: calc(var(--nav-h) + var(--safe-bottom) + 12px); left: 50%;
  transform: translateX(-50%) translateY(20px); background: var(--ink); color: var(--ivory);
  padding: 9px 18px; border-radius: 20px; font-size: 13px; pointer-events: none;
  opacity: 0; transition: opacity 0.2s, transform 0.2s; z-index: 100; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ════════════════════════════════════════════════
   SCROLLBAR + UTILITIES
════════════════════════════════════════════════ */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.sr-only { position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); }
</style>
</head>

<body>
<div id="app">

  <!-- Loading -->
  <div id="screen-loading" class="screen active">
    <div class="loading-crown">✦</div>
    <div class="loading-text">Chargement…</div>
  </div>

  <!-- ── Accueil ── -->
  <div id="screen-home" class="screen">
    <div class="topbar">
      <div>
        <div class="topbar-title">31 Jours avec Marie</div>
        <div class="topbar-sub" id="home-date-label">—</div>
      </div>
      <div class="topbar-actions">
        <button class="topbar-action" onclick="App.showScreen('list')" title="Tous les jours" aria-label="Voir tous les jours">☰</button>
      </div>
    </div>
    <div class="calendar-wrap">
      <div class="calendar-label">Ce mois</div>
      <div class="calendar-grid" id="cal-grid" role="grid" aria-label="Calendrier des 31 jours"></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-row">
        <div class="progress-bar-track" role="progressbar" aria-valuemin="0" aria-valuemax="31">
          <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
        </div>
        <div class="progress-label" id="progress-label">0 / 31</div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="hero-scroll" id="hero-scroll"></div>
  </div>

  <!-- ── Jours ── -->
  <div id="screen-list" class="screen">
    <div class="topbar">
      <div>
        <div class="topbar-title">Les 31 Jours</div>
        <div class="topbar-sub">Vierge Marie — Luisa Piccarreta</div>
      </div>
      <button class="topbar-action" onclick="App.showScreen('home')" aria-label="Accueil">⌂</button>
    </div>
    <div class="list-scroll" id="list-scroll"></div>
  </div>

  <!-- ── Lecteur ── -->
  <div id="screen-reader" class="screen">
    <div class="reader-topbar">
      <button class="reader-back" id="reader-back-btn" aria-label="Retour">←</button>
      <div class="reader-topbar-info">
        <div class="reader-topbar-day" id="reader-day-badge"></div>
        <div class="reader-topbar-title" id="reader-topbar-title"></div>
      </div>
      <div class="reader-topbar-actions">
        <button class="reader-icon-btn" id="btn-textsize" onclick="App.toggleTextsizePanel()" title="Taille du texte" aria-label="Taille du texte">Aᵃ</button>
      </div>
    </div>

    <div class="reader-scroll" id="reader-scroll">
      <div class="reader-hero">
        <div class="reader-hero-badge" id="reader-hero-badge"></div>
        <div class="reader-hero-title" id="reader-hero-title"></div>
      </div>
      <div class="reader-body" id="reader-body"></div>
    </div>

    <div class="reader-nav">
      <button class="reader-nav-btn" id="reader-prev" disabled>← <span class="nav-label" id="reader-prev-label">Précédent</span></button>
      <div class="reader-nav-center" id="reader-nav-center"></div>
      <button class="reader-nav-btn" id="reader-next" disabled><span class="nav-label" id="reader-next-label">Suivant</span> →</button>
    </div>

    <div class="reader-actionbar">
      <button class="action-btn complete-btn" id="btn-complete" onclick="App.toggleComplete()">
        <span class="action-icon" id="complete-icon">○</span>
        <span id="complete-label">Terminé</span>
      </button>
      <button class="action-btn" id="btn-fav" onclick="App.toggleFavorite()">
        <span class="action-icon" id="fav-icon">♡</span>
        <span>Favori</span>
      </button>
      <button class="action-btn" onclick="App.shareDay()">
        <span class="action-icon">↑</span>
        <span>Partager</span>
      </button>
    </div>

    <!-- Text size panel (anchored above action bar) -->
    <div class="textsize-panel" id="textsize-panel">
      <div class="textsize-panel-label">Taille du texte</div>
      <div class="textsize-row">
        <span class="textsize-small" aria-hidden="true">A</span>
        <input type="range" class="textsize-slider" id="textsize-slider"
               min="14" max="22" step="1" value="17"
               aria-label="Taille du texte"
               oninput="App.applyTextSize(this.value)">
        <span class="textsize-large" aria-hidden="true">A</span>
        <span class="textsize-value" id="textsize-value">17</span>
      </div>
      <div class="textsize-preview" id="textsize-preview">
        « Ma fille, écoute-moi… »
      </div>
    </div>
  </div>

  <!-- ── Mon Espace ── -->
  <div id="screen-espace" class="screen">
    <div class="topbar">
      <div>
        <div class="topbar-title">Mon Espace</div>
        <div class="topbar-sub">Favoris · Notes · Progression</div>
      </div>
    </div>
    <div class="espace-scroll" id="espace-scroll"></div>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav" id="bottom-nav" aria-label="Navigation principale">
    <button class="nav-btn active" id="nav-home" onclick="App.showScreen('home')" aria-label="Accueil">
      <span class="nav-icon">⌂</span>Accueil
    </button>
    <button class="nav-btn" id="nav-list" onclick="App.showScreen('list')" aria-label="Jours">
      <span class="nav-icon">◎</span>Jours
    </button>
    <button class="nav-btn" id="nav-espace" onclick="App.showScreen('espace')" aria-label="Mon Espace">
      <span class="nav-icon">♡</span>Mon Espace
    </button>
  </nav>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- Note modal -->
  <div class="modal-overlay" id="note-modal" onclick="App.closeNoteModal(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <div class="modal-title">Ajouter une note</div>
        <div class="modal-subtitle" id="note-modal-subtitle"></div>
      </div>
      <div class="modal-body">
        <div class="note-excerpt" id="note-modal-excerpt"></div>
        <textarea class="note-textarea" id="note-textarea"
                  placeholder="Votre réflexion personnelle…"
                  maxlength="1000" rows="5"></textarea>
        <div style="text-align:right;font-size:11px;color:var(--muted);margin-top:4px">
          <span id="note-char-count">0</span> / 1000
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn modal-btn-cancel" onclick="App.closeNoteModal()">Annuler</button>
        <button class="modal-btn modal-btn-save" onclick="App.saveNote()">Enregistrer</button>
      </div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
//  STORAGE KEYS
// ════════════════════════════════════════════════════════════════
const SK = {
  READ:       'mjv_read',
  FAVORITES:  'mjv_favorites',
  NOTES:      'mjv_notes',       // { paragraph_id: { text, pid, unit_id, ts } }
  TEXT_SIZE:  'mjv_textsize',
};

// ════════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════════
const State = {
  corpus:       null,
  dayMap:       {},          // day_number → unit
  currentSeq:   1,
  prevScreen:   'home',
  todayDayNum:  new Date().getDate(),
  read:         new Set(),
  favorites:    new Set(),   // Set<paragraph_id>
  notes:        {},          // { [paragraph_id]: { text, unit_id, ts } }
  textSize:     17,
  noteTargetPid: null,       // paragraph_id being noted
};

// ════════════════════════════════════════════════════════════════
//  PERSISTENCE
// ════════════════════════════════════════════════════════════════
function loadStorage() {
  try {
    const r = localStorage.getItem(SK.READ);
    State.read = r ? new Set(JSON.parse(r)) : new Set();
    const f = localStorage.getItem(SK.FAVORITES);
    State.favorites = f ? new Set(JSON.parse(f)) : new Set();
    const n = localStorage.getItem(SK.NOTES);
    State.notes = n ? JSON.parse(n) : {};
    const ts = localStorage.getItem(SK.TEXT_SIZE);
    State.textSize = ts ? parseInt(ts) : 17;
  } catch(e) {
    State.read = new Set(); State.favorites = new Set();
    State.notes = {}; State.textSize = 17;
  }
}
const saveRead      = () => { try { localStorage.setItem(SK.READ, JSON.stringify([...State.read])); } catch(e){} };
const saveFavorites = () => { try { localStorage.setItem(SK.FAVORITES, JSON.stringify([...State.favorites])); } catch(e){} };
const saveNotes     = () => { try { localStorage.setItem(SK.NOTES, JSON.stringify(State.notes)); } catch(e){} };
const saveTextSize  = () => { try { localStorage.setItem(SK.TEXT_SIZE, State.textSize); } catch(e){} };

// ════════════════════════════════════════════════════════════════
//  APP
// ════════════════════════════════════════════════════════════════
const App = {

  // ── Init ─────────────────────────────────────────────────────
  async init() {
    loadStorage();
    this.applyTextSize(State.textSize, false);

    try {
      const res = await fetch(window.APP_BASE + 'corpus/days.json');
      if (!res.ok) throw new Error(res.status);
      State.corpus = await res.json();
      State.corpus.forEach(u => { if (u.day_number) State.dayMap[u.day_number] = u; });
    } catch(e) {
      document.getElementById('screen-loading').innerHTML =
        '<div style="padding:40px;text-align:center;font-family:Georgia,serif;color:var(--muted)">Erreur de chargement.<br>Vérifiez votre connexion.</div>';
      return;
    }

    this.buildCalendar();
    this.buildList();
    this.renderHome();
    this.showScreen('home', true);
    this.registerSW();
    document.addEventListener('click', e => {
      if (!e.target.closest('#textsize-panel') && !e.target.closest('#btn-textsize')) {
        document.getElementById('textsize-panel').classList.remove('open');
      }
    });
  },

  registerSW() {
    if ('serviceWorker' in navigator) navigator.serviceWorker.register(window.APP_BASE + 'sw.js', { scope: window.APP_BASE }).catch(() => {});
  },

  // ── Navigation ───────────────────────────────────────────────
  showScreen(name, initial = false) {
    ['loading','home','list','reader','espace'].forEach(s => {
      document.getElementById('screen-' + s)?.classList.toggle('active', s === name);
    });
    const nav = document.getElementById('bottom-nav');
    nav.style.display = name === 'reader' ? 'none' : '';
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    const map = { home:'nav-home', list:'nav-list', espace:'nav-espace' };
    if (map[name]) document.getElementById(map[name])?.classList.add('active');
    if (!initial && name !== 'reader') State.prevScreen = name;
    if (name === 'espace') this.renderEspace();
    if (name === 'home') this.updateCalendar();
    // Close text size panel when leaving reader
    if (name !== 'reader') document.getElementById('textsize-panel').classList.remove('open');
  },

  // ── Calendar ─────────────────────────────────────────────────
  buildCalendar() {
    const grid = document.getElementById('cal-grid');
    grid.innerHTML = '';
    const today = State.todayDayNum;
    for (let i = 1; i <= 31; i++) {
      const cell = document.createElement('button');
      cell.className = 'cal-cell';
      cell.textContent = i;
      cell.dataset.day = i;
      cell.setAttribute('aria-label', `Jour ${i}`);
      const unit = State.dayMap[i];
      if (!unit) {
        cell.classList.add('appendix');
        cell.disabled = true;
        cell.setAttribute('aria-disabled', 'true');
      } else {
        if (i === today) cell.classList.add('today');
        if (State.read.has(i)) cell.classList.add('read');
        cell.addEventListener('click', () => this.openDay(i));
      }
      grid.appendChild(cell);
    }
  },

  updateCalendar() {
    document.querySelectorAll('.cal-cell').forEach(cell => {
      const d = parseInt(cell.dataset.day);
      if (!State.dayMap[d]) return;
      cell.classList.toggle('read', State.read.has(d));
    });
    const count = State.read.size;
    document.getElementById('progress-fill').style.width = (count / 31 * 100) + '%';
    document.getElementById('progress-label').textContent = count + ' / 31';
    document.querySelector('.progress-bar-track').setAttribute('aria-valuenow', count);
  },

  // ── Home ─────────────────────────────────────────────────────
  renderHome() {
    const today = State.todayDayNum;
    const unit = State.dayMap[today] || State.corpus[0];
    const dayNum = unit.day_number;
    const dateStr = new Intl.DateTimeFormat('fr-FR', {weekday:'long', day:'numeric', month:'long'}).format(new Date());
    document.getElementById('home-date-label').textContent = dateStr;
    this.updateCalendar();
    const si = unit.sections.find(s => s.section_type === 'soul_intro');
    const le = unit.sections.find(s => s.section_type === 'lesson');
    const excerpt = (si?.paragraphs[0]?.text) || (le?.paragraphs[0]?.text) || '';
    document.getElementById('hero-scroll').innerHTML = `
      <div class="hero-card" onclick="App.openDay(${dayNum})">
        <div class="hero-card-header">
          <div class="hero-day-badge">✦ Aujourd'hui</div>
          <div class="hero-day-num">${dayNum}</div>
          <div class="hero-ordinal">${this.esc(unit.ordinal_source)}</div>
        </div>
        <div class="hero-card-body">
          <div class="hero-title">${this.esc(unit.title)}</div>
          <div class="hero-excerpt">${this.esc(excerpt)}</div>
          <div class="hero-cta">
            <button class="hero-read-btn" onclick="event.stopPropagation();App.openDay(${dayNum})">Lire →</button>
            <div class="hero-nav-btns">
              <button class="hero-nav-btn" ${dayNum<=1?'disabled':''} onclick="event.stopPropagation();App.openDay(${dayNum-1})" aria-label="Jour précédent">←</button>
              <button class="hero-nav-btn" ${dayNum>=31?'disabled':''} onclick="event.stopPropagation();App.openDay(${dayNum+1})" aria-label="Jour suivant">→</button>
            </div>
          </div>
        </div>
      </div>
      ${this.renderNearbyDays(dayNum)}
    `;
  },

  renderNearbyDays(currentDay) {
    const nearby = [];
    for (let i = -2; i <= 2; i++) {
      const d = currentDay + i;
      if (d >= 1 && d <= 31 && d !== currentDay && State.dayMap[d]) nearby.push(State.dayMap[d]);
    }
    if (!nearby.length) return '';
    return `
      <div class="list-section-label" style="margin-top:6px">Autres jours</div>
      ${nearby.map(u => this.renderListCard(u)).join('')}
      <div style="height:20px"></div>
    `;
  },

  // ── List ─────────────────────────────────────────────────────
  buildList() {
    const main = State.corpus.filter(u => u.unit_type === 'main_day');
    const apps = State.corpus.filter(u => u.unit_type === 'appendix');
    document.getElementById('list-scroll').innerHTML = `
      <div class="list-section-label">Méditations du mois</div>
      ${main.map(u => this.renderListCard(u)).join('')}
      <div class="list-section-label" style="margin-top:16px">Compléments — Appendices</div>
      ${apps.map(u => this.renderListCard(u)).join('')}
      <div style="height:16px"></div>
    `;
  },

  renderListCard(u) {
    const today = State.todayDayNum;
    const isToday = u.day_number === today;
    const isRead = State.read.has(u.day_number);
    const label = u.day_number ? (isToday ? '✦' : u.day_number) : 'A' + u.appendix_number;
    const cls = isToday ? 'today-circle' : (isRead ? 'read-circle' : '');
    const meta = u.day_number ? (u.date_default || '') : 'Appendice ' + u.appendix_number;
    const noteCount = this.unitNoteCount(u);
    const noteBadge = noteCount > 0 ? `<span style="font-size:10px;color:var(--accent);margin-left:4px">✎${noteCount}</span>` : '';
    return `
      <div class="list-card" onclick="App.openUnit('${u.unit_id}')">
        <div class="list-day-circle ${cls}">${label}</div>
        <div class="list-info">
          <div class="list-title">${this.esc(u.title)}${noteBadge}</div>
          <div class="list-meta">${meta}</div>
        </div>
        <div class="list-chevron">›</div>
      </div>
    `;
  },

  unitNoteCount(u) {
    return u.sections.reduce((acc, s) =>
      acc + s.paragraphs.filter(p => State.notes[p.paragraph_id]).length, 0);
  },

  // ── Reader ────────────────────────────────────────────────────
  openDay(dayNum) {
    const unit = State.dayMap[dayNum];
    if (unit) this.openUnit(unit.unit_id);
  },

  openUnit(unitId) {
    const unit = State.corpus.find(u => u.unit_id === unitId);
    if (!unit) return;
    State.currentSeq = unit.sequence_meditative;

    const badge = unit.day_number
      ? `Jour ${unit.day_number} · 31 Jours avec Marie`
      : `Appendice ${unit.appendix_number} · Complément`;
    document.getElementById('reader-day-badge').textContent = badge;
    document.getElementById('reader-topbar-title').textContent = unit.title;
    document.getElementById('reader-hero-badge').textContent = badge;
    document.getElementById('reader-hero-title').textContent = unit.title;
    document.getElementById('reader-back-btn').onclick = () => this.showScreen(State.prevScreen);

    this.renderReaderBody(unit);
    this.updateReaderNav(unit);
    this.updateActionBar(unit);
    document.getElementById('reader-scroll').scrollTop = 0;
    document.getElementById('textsize-panel').classList.remove('open');
    this.showScreen('reader');
  },

  renderReaderBody(unit) {
    const sectionLabels = {
      soul_intro:       '✦ L\'âme',
      lesson:           '✦ Leçon de la Reine du Ciel',
      soul_response:    '✦ Réponse de l\'âme',
      queen_response:   '✦ La Reine d\'amour',
      practice:         '✦ Petite pratique',
      jaculatory_prayer:'✦ Oraison jaculatoire',
      unit_intro_note:  '✦ Introduction',
    };
    const paraClass = {
      soul_intro: 'para-soul', soul_response: 'para-soul',
      lesson: 'para-mary', queen_response: 'para-mary', unit_intro_note: 'para-mary',
      practice: 'para-practice', jaculatory_prayer: 'para-prayer',
    };
    let html = '';
    unit.sections.forEach(sec => {
      const label = sectionLabels[sec.section_type] || sec.section_title_source || sec.section_type;
      const cls = paraClass[sec.section_type] || 'para-mary';
      html += `<div class="section-label">${this.esc(label)}</div>`;
      sec.paragraphs.forEach(p => {
        const noteData = State.notes[p.paragraph_id];
        html += `
          <p class="${cls}" data-pid="${p.paragraph_id}">
            ${this.formatText(p.text)}
            <button class="para-note-btn" onclick="App.openNoteModal('${p.paragraph_id}')" title="Ajouter une note" aria-label="Ajouter une note">✎</button>
          </p>
        `;
        if (noteData) {
          html += `
            <div class="para-note" data-note-pid="${p.paragraph_id}">
              <span class="para-note-icon">✎</span>
              <span class="para-note-text">${this.esc(noteData.text)}</span>
              <button class="para-note-del" onclick="App.deleteNote('${p.paragraph_id}')" title="Supprimer la note" aria-label="Supprimer la note">×</button>
            </div>
          `;
        }
      });
    });
    document.getElementById('reader-body').innerHTML = html;
  },

  updateReaderNav(unit) {
    const seq = unit.sequence_meditative;
    const total = State.corpus.length;
    const prevU = State.corpus.find(u => u.sequence_meditative === seq - 1);
    const nextU = State.corpus.find(u => u.sequence_meditative === seq + 1);
    const prevBtn = document.getElementById('reader-prev');
    const nextBtn = document.getElementById('reader-next');
    prevBtn.disabled = !prevU;
    nextBtn.disabled = !nextU;
    if (prevU) {
      document.getElementById('reader-prev-label').textContent =
        prevU.day_number ? 'Jour ' + prevU.day_number : 'App. ' + prevU.appendix_number;
      prevBtn.onclick = () => this.openUnit(prevU.unit_id);
    }
    if (nextU) {
      document.getElementById('reader-next-label').textContent =
        nextU.day_number ? 'Jour ' + nextU.day_number : 'App. ' + nextU.appendix_number;
      nextBtn.onclick = () => this.openUnit(nextU.unit_id);
    }
    document.getElementById('reader-nav-center').textContent = seq + ' / ' + total;
  },

  updateActionBar(unit) {
    const isDone = unit.day_number && State.read.has(unit.day_number);
    document.getElementById('complete-icon').textContent = isDone ? '✓' : '○';
    document.getElementById('complete-label').textContent = isDone ? 'Lu' : 'Terminé';
    document.getElementById('btn-complete').classList.toggle('done', !!isDone);
    const allPids = unit.sections.flatMap(s => s.paragraphs.map(p => p.paragraph_id));
    const hasFav = allPids.some(pid => State.favorites.has(pid));
    document.getElementById('fav-icon').textContent = hasFav ? '♥' : '♡';
    document.getElementById('btn-fav').classList.toggle('active', hasFav);
  },

  toggleComplete() {
    const unit = State.corpus.find(u => u.sequence_meditative === State.currentSeq);
    if (!unit?.day_number) return;
    const d = unit.day_number;
    if (State.read.has(d)) { State.read.delete(d); this.showToast('Marqué comme non lu'); }
    else { State.read.add(d); this.showToast('Jour ' + d + ' terminé ✓'); }
    saveRead(); this.updateActionBar(unit); this.updateCalendar();
  },

  toggleFavorite() {
    const unit = State.corpus.find(u => u.sequence_meditative === State.currentSeq);
    if (!unit) return;
    const lesson = unit.sections.find(s => s.section_type === 'lesson');
    if (!lesson?.paragraphs.length) return;
    const pid = lesson.paragraphs[0].paragraph_id;
    if (State.favorites.has(pid)) { State.favorites.delete(pid); this.showToast('Retiré des favoris'); }
    else { State.favorites.add(pid); this.showToast('Ajouté aux favoris ♥'); }
    saveFavorites(); this.updateActionBar(unit);
  },

  shareDay() {
    const unit = State.corpus.find(u => u.sequence_meditative === State.currentSeq);
    if (!unit) return;
    const text = `31 Jours avec Marie — ${unit.ordinal_source || 'Jour ' + unit.day_number}\n${unit.title}`;
    if (navigator.share) navigator.share({ title: '31 Jours avec Marie', text }).catch(() => {});
    else navigator.clipboard?.writeText(text).then(() => this.showToast('Copié !')).catch(() => {});
  },

  // ── Text size ────────────────────────────────────────────────
  toggleTextsizePanel() {
    const panel = document.getElementById('textsize-panel');
    const isOpen = panel.classList.toggle('open');
    document.getElementById('btn-textsize').classList.toggle('active', isOpen);
    if (isOpen) {
      document.getElementById('textsize-slider').value = State.textSize;
      document.getElementById('textsize-value').textContent = State.textSize;
    }
  },

  applyTextSize(size, save = true) {
    size = Math.max(14, Math.min(22, parseInt(size)));
    State.textSize = size;
    document.documentElement.style.setProperty('--reader-size', size + 'px');
    document.documentElement.style.setProperty('--reader-lh', size > 19 ? '1.88' : '1.82');
    document.getElementById('textsize-value').textContent = size;
    document.getElementById('textsize-slider').value = size;
    if (save) saveTextSize();
  },

  // ── Notes ────────────────────────────────────────────────────
  openNoteModal(pid) {
    State.noteTargetPid = pid;
    // Find the paragraph and its unit
    let para = null, unit = null;
    for (const u of State.corpus) {
      for (const s of u.sections) {
        for (const p of s.paragraphs) {
          if (p.paragraph_id === pid) { para = p; unit = u; break; }
        }
        if (para) break;
      }
      if (para) break;
    }
    if (!para) return;
    const existing = State.notes[pid];
    const dayLabel = unit.day_number ? 'Jour ' + unit.day_number : 'Appendice ' + unit.appendix_number;
    document.getElementById('note-modal-subtitle').textContent = dayLabel + ' · ' + pid;
    document.getElementById('note-modal-excerpt').textContent = para.text.slice(0, 160) + (para.text.length > 160 ? '…' : '');
    const ta = document.getElementById('note-textarea');
    ta.value = existing ? existing.text : '';
    document.getElementById('note-char-count').textContent = ta.value.length;
    ta.oninput = () => { document.getElementById('note-char-count').textContent = ta.value.length; };
    document.getElementById('note-modal').classList.add('open');
    setTimeout(() => ta.focus(), 300);
  },

  closeNoteModal(e) {
    if (e && e.target !== document.getElementById('note-modal')) return;
    document.getElementById('note-modal').classList.remove('open');
    State.noteTargetPid = null;
  },

  saveNote() {
    const pid = State.noteTargetPid;
    if (!pid) return;
    const text = document.getElementById('note-textarea').value.trim();
    if (text) {
      // Find unit
      let unit = null;
      for (const u of State.corpus) {
        if (u.sections.some(s => s.paragraphs.some(p => p.paragraph_id === pid))) { unit = u; break; }
      }
      State.notes[pid] = { text, unit_id: unit?.unit_id, pid, ts: Date.now() };
      this.showToast('Note enregistrée ✎');
    } else {
      delete State.notes[pid];
      this.showToast('Note supprimée');
    }
    saveNotes();
    document.getElementById('note-modal').classList.remove('open');
    State.noteTargetPid = null;
    // Refresh reader body and list badge
    const unit = State.corpus.find(u => u.sequence_meditative === State.currentSeq);
    if (unit) this.renderReaderBody(unit);
    this.buildList();
  },

  deleteNote(pid) {
    delete State.notes[pid];
    saveNotes();
    this.showToast('Note supprimée');
    const unit = State.corpus.find(u => u.sequence_meditative === State.currentSeq);
    if (unit) this.renderReaderBody(unit);
    this.buildList();
  },

  // ── Mon Espace ───────────────────────────────────────────────
  renderEspace() {
    const readCount = State.read.size;
    const favCount = State.favorites.size;
    const noteCount = Object.keys(State.notes).length;
    let html = `
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-num blue">${readCount}</div><div class="stat-label">Jours lus</div></div>
        <div class="stat-card"><div class="stat-num gold">${favCount}</div><div class="stat-label">Favoris</div></div>
        <div class="stat-card"><div class="stat-num green">${noteCount}</div><div class="stat-label">Notes</div></div>
      </div>
    `;

    // Favorites
    if (State.favorites.size > 0) {
      html += `<div class="espace-section-title">Passages favoris</div>`;
      State.favorites.forEach(pid => {
        let para = null, unit = null;
        for (const u of State.corpus) {
          for (const s of u.sections) {
            for (const p of s.paragraphs) { if (p.paragraph_id === pid) { para = p; unit = u; } }
          }
        }
        if (!para || !unit) return;
        const label = unit.day_number ? 'Jour ' + unit.day_number : 'Appendice ' + unit.appendix_number;
        html += `
          <div class="fav-card" onclick="App.openUnit('${unit.unit_id}')">
            <div class="fav-card-day">${this.esc(label)}</div>
            <div class="fav-card-text">${this.esc(para.text)}</div>
          </div>`;
      });
    }

    // Notes
    const noteEntries = Object.entries(State.notes).sort((a,b) => b[1].ts - a[1].ts);
    if (noteEntries.length > 0) {
      html += `<div class="espace-section-title" style="margin-top:${favCount>0?'16px':'0'}">Mes notes</div>`;
      noteEntries.forEach(([pid, note]) => {
        const unit = State.corpus.find(u => u.unit_id === note.unit_id);
        if (!unit) return;
        const label = unit.day_number ? 'Jour ' + unit.day_number : 'Appendice ' + unit.appendix_number;
        const date = new Date(note.ts).toLocaleDateString('fr-FR', {day:'numeric', month:'short'});
        html += `
          <div class="note-espace-card" onclick="App.openUnit('${unit.unit_id}')">
            <div class="note-espace-meta">${this.esc(label)} · ${date}</div>
            <div class="note-espace-text">${this.esc(note.text)}</div>
          </div>`;
      });
    }

    if (readCount === 0 && favCount === 0 && noteCount === 0) {
      html += `
        <div class="espace-empty">
          <div class="espace-empty-icon">✦</div>
          <div class="espace-empty-text">Votre progression, vos favoris<br>et vos notes apparaîtront ici.</div>
        </div>`;
    }
    html += '<div style="height:16px"></div>';
    document.getElementById('espace-scroll').innerHTML = html;
  },

  // ── Utilities ────────────────────────────────────────────────
  showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2200);
  },

  esc(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  },

  formatText(text) {
    if (!text) return '';
    let t = this.esc(text);
    t = t.replace(/«\s?([\s\S]*?)\s?»/g, '<em>« $1 »</em>');
    return t;
  },
};

document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
